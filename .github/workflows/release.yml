name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (x86_64 musl)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev pkg-config
          # Install musl-compatible OpenSSL development headers
          sudo apt-get install -y libssl-dev
          # For musl cross-compilation, we need to set up the right paths
          # The musl-gcc wrapper will find headers in /usr/include
          # But we need to make sure openssl headers are available for musl
          export PKG_CONFIG_ALLOW_CROSS=1
          export OPENSSL_DIR=/usr/lib/x86_64-linux-gnu
          export OPENSSL_LIB_DIR=/usr/lib/x86_64-linux-gnu
          export OPENSSL_INCLUDE_DIR=/usr/include
          # Install musl-specific openssl if available
          sudo apt-get install -y libssl-dev:amd64 2>/dev/null || true

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-musl

      - name: Build
        env:
          PKG_CONFIG_ALLOW_CROSS: 1
          OPENSSL_DIR: /usr/lib/x86_64-linux-gnu
          OPENSSL_LIB_DIR: /usr/lib/x86_64-linux-gnu
          OPENSSL_INCLUDE_DIR: /usr/include
        run: cargo build --release --target x86_64-unknown-linux-musl --workspace

      - name: Package binary
        run: |
          TARGET=x86_64-unknown-linux-musl
          ARCHIVE="decoupled-ai-${TARGET}.tar.gz"
          mkdir -p dist
          cp target/${TARGET}/release/decoupled-ai-server dist/
          tar -czf dist/${ARCHIVE} -C dist decoupled-ai-server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: decoupled-ai-x86_64-unknown-linux-musl
          path: dist/decoupled-ai-x86_64-unknown-linux-musl.tar.gz
          retention-days: 30

  build-macos:
    name: Build macOS (x86_64 & aarch64)
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --workspace

      - name: Package binary
        run: |
          TARGET=${{ matrix.target }}
          ARCHIVE="decoupled-ai-${TARGET}.tar.gz"
          mkdir -p dist
          cp target/${TARGET}/release/decoupled-ai-server dist/
          tar -czf dist/${ARCHIVE} -C dist decoupled-ai-server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: decoupled-ai-${{ matrix.target }}
          path: dist/decoupled-ai-${{ matrix.target }}.tar.gz
          retention-days: 30

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc --workspace

      - name: Package binary
        run: |
          $archive = "decoupled-ai-x86_64-pc-windows-msvc.zip"
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/x86_64-pc-windows-msvc/release/decoupled-ai-server.exe dist/
          Compress-Archive -Path dist/decoupled-ai-server.exe -DestinationPath dist/$archive
          echo "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: decoupled-ai-windows
          path: dist/decoupled-ai-x86_64-pc-windows-msvc.zip
          retention-days: 30

  release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Prepare install.sh
        run: |
          cp install.sh dist/install.sh
          chmod +x dist/install.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: DeCoupled-AI ${{ github.event.inputs.version || github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/install.sh
          generate_release_notes: true